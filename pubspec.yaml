name: fe_sakukampus_pbm
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: 1.1.2
  geolocator: ^14.0.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.3
  provider: ^6.1.5+1
  awesome_dialog: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - asset/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "asset/images/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1B2A4A"
  adaptive_icon_foreground: "asset/images/app_icon.png"
